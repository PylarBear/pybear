[tool.poetry]
name = "pybear"
version = "0.2.3"
description = "Python modules for miscellaneous data analytics applications"
license = "BSD-3-clause"
authors = ["Bill Sousa <WKSJR99@msn.com>"]
maintainers = ["Bill Sousa"]
readme = "README.rst"
# The contents of the README file(s) are used to populate the Description field
# of your distribution’s metadata (similar to long_description in setuptools).
# When multiple files are specified they are concatenated with newlines.
homepage = "https://github.com/PylarBear/pybear"
repository = "https://github.com/PylarBear/pybear"
#documentation
keywords = ["python data analytics scikit-API text"]
#classifiers
packages = [
	{ include = "pybear", from = "src"}
]
include = [
    "LICENSE",
    "README.rst",
    "CHANGELOG.md",
    "tests"
]
#exclude


[tool.poetry.dependencies]
# These packages are mandatory and form the core of this package’s distribution.
python = ">=3.10"
joblib = "==1.5.3"   # check 1.5.2
numpy = "==2.1.3"    # 2.2.0 works, check 2.1.2
pandas = "==2.2.3"
polars = "==1.19.0"
psutil = "==5.7.0"
scipy = [
    {version = ">=1.15.0,<1.16.0", python = "<3.11"},  # find lower bound for py3.10
    {version = ">=1.16.1", python = ">=3.11"}
]
scikit-learn = [
    {version = ">=1.5.2,<1.8.0", python = "<3.11"},  # find lower bound for py3.10
    {version = ">=1.8.0", python = ">=3.11"}   # check starting at 1.6.0
]
typing_extensions = "==4.12.0"


[tool.poetry.group.dev.dependencies]
docutils = ">=0.20"
jupyter = "*"
notebook = "*"
numpydoc = "*"
pyarrow = [
    {version = ">=18.0.0", python = "<3.14"},
    {version = ">=24.0.0", python = ">=3.14"}
]
pydata-sphinx-theme = "*"
sphinx = "*"
sphinx-autobuild = "*"
sphinx-sitemap = "*"


[tool.poetry.group.test.dependencies]
pytest = "==8.0.0"    # 7.0.0 does not work. check >7.0.0,<8.0.0
pytest-cov = "*"
pytest-html = "*"


[tool.poetry.extras]
# Optional dependencies. They can be opted into by apps.


[tool.poetry.scripts]


[tool.poetry.plugins]


[tool.poetry.urls]
Homepage = "https://github.com/PylarBear/pybear"
Documentation = "https://pybear.readthedocs.io/en/stable/"


[tool.coverage.run]
source = ["pybear"]


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"


